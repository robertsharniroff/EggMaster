name: Build & Release EXE

on:
  push:
    tags:
      - 'v*'  # Триггер при пуше тега v1.0.0, v2.1.3 и т.д.
  workflow_dispatch:
    inputs:
      version:
        description: 'Версия релиза (например 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build-and-release:
    runs-on: windows-latest
    
    steps:
      # 1. Получаем код
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Зависимости
      - name: Install PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          # pip install -r requirements.txt  # если есть

      # 4. Сборка EXE
      - name: Build EXE
        run: |
          pyinstaller --onefile --console --name egg_stamp_gen egg_stamp_gen.py

      # 5. Определяем версию релиза
      - name: Get version
        id: get_version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "VERSION=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      # 6. Создаём релиз и грузим туда exe
      - name: Create Release & Upload EXE
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: "Egg Stamp Gen ${{ steps.get_version.outputs.VERSION }}"
          body: |
            ## 🥚 Egg Stamp Gen ${{ steps.get_version.outputs.VERSION }}
            
            ### Что внутри:
            - egg_stamp_gen.exe — готовый исполняемый файл (Windows)
            
            ### Как использовать:
            1. Скачать egg_stamp_gen.exe
            2. Запустить — консоль будет видна
            
            ---
            *Собрано автоматически via GitHub Actions*
          files: dist/egg_stamp_gen.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
