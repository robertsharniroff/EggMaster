name: Build & Release EXE

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Версия релиза (например 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build-and-release:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ALL dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy
          pip install opencv-python-headless
          pip install scipy
          pip install scikit-image
          pip install trimesh
          pip install fastapi
          pip install uvicorn[standard]
          pip install python-multipart
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile ^
            --console ^
            --name egg_stamp_gen ^
            --hidden-import=numpy ^
            --hidden-import=cv2 ^
            --hidden-import=scipy ^
            --hidden-import=scipy.ndimage ^
            --hidden-import=skimage ^
            --hidden-import=skimage.measure ^
            --hidden-import=trimesh ^
            --hidden-import=fastapi ^
            --hidden-import=uvicorn ^
            --collect-all cv2 ^
            --collect-all skimage ^
            egg_stamp_gen.py
        shell: cmd

      - name: Get version
        id: get_version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "VERSION=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release & Upload EXE
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: "EggStamp Gen ${{ steps.get_version.outputs.VERSION }}"
          body: |
            ## 🥚 EggStamp Gen ${{ steps.get_version.outputs.VERSION }}
            
            ### Что внутри:
            - egg_stamp_gen.exe — готовый EXE (Windows)
            
            ### Как использовать:
            1. Скачать egg_stamp_gen.exe
            2. Запустить → открыть http://127.0.0.1:8000
            
            ---
            *Собрано автоматически via GitHub Actions*
          files: dist/egg_stamp_gen.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
